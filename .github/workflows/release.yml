name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      PUB_CACHE: D:\pub_cache
    steps:
      - uses: actions/checkout@v4

      - name: Copy source to short path (avoid MAX_PATH with junction includes)
        shell: pwsh
        run: |
          robocopy "$env:GITHUB_WORKSPACE" C:\proj /E /XD .git /NFL /NDL /NJH /NJS /NC /NS
          if ($LASTEXITCODE -gt 7) { throw "robocopy failed: $LASTEXITCODE" }
          Write-Host "Copied to C:\proj"
          exit 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: C:\proj
        run: flutter pub get

      - name: Build Windows
        working-directory: C:\proj
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path C:\proj\build\windows\x64\runner\Release\* -DestinationPath "$env:GITHUB_WORKSPACE\goatly-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: goatly-windows
          path: goatly-windows.zip

