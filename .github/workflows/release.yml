name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      PUB_CACHE: D:\pub_cache
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Set MSVC extra include dirs via CL env var
        shell: pwsh
        run: |
          # MSVC reads the CL env var and prepends its contents to every cl.exe
          # invocation. We use this to add real pub-cache paths for plugins whose
          # headers cannot be found through .plugin_symlinks junction points.
          $pub = $env:PUB_CACHE
          $flags = @()
          foreach ($pkg in @("flutter_secure_storage_windows", "screen_retriever_windows")) {
            $dirs = Get-ChildItem "$pub\hosted\pub.dev" -Filter "$pkg-*" -Directory -ErrorAction SilentlyContinue
            if ($dirs) {
              $latest = ($dirs | Sort-Object Name | Select-Object -Last 1)
              $pkgDir = "$pub\hosted\pub.dev\$($latest.Name)\windows"
              if (Test-Path $pkgDir) {
                $flags += "/I`"$pkgDir`""
                Write-Host "Adding include: $pkgDir"
              }
            }
          }
          if ($flags.Count -gt 0) {
            $cl = $flags -join " "
            echo "CL=$cl" >> $env:GITHUB_ENV
            Write-Host "CL set to: $cl"
          }

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath goatly-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: goatly-windows
          path: goatly-windows.zip

  # ─── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r goatly-macos.zip *.app
          mv goatly-macos.zip "${{ github.workspace }}/goatly-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: goatly-macos
          path: goatly-macos.zip

  # ─── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libglib2.0-dev liblzma-dev \
            libpulse-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Tar Linux build
        run: tar -czf goatly-linux.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: goatly-linux
          path: goatly-linux.tar.gz

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Verify artifacts
        run: |
          echo "Listing downloaded artifacts:"
          ls -lR .
          echo ""
          echo "Checking for required files:"
          test -f goatly-windows/goatly-windows.zip && echo "✓ Windows zip found" || echo "✗ Windows zip NOT found"
          test -f goatly-macos/goatly-macos.zip && echo "✓ macOS zip found" || echo "✗ macOS zip NOT found"
          test -f goatly-linux/goatly-linux.tar.gz && echo "✓ Linux tar.gz found" || echo "✗ Linux tar.gz NOT found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GOATLY ${{ github.ref_name }}"
          body: |
            ## GOATLY Meeting Summarizer ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `goatly-windows.zip` — extract and run the `.exe` |
            | macOS    | `goatly-macos.zip` — extract and drag `.app` to Applications |
            | Linux    | `goatly-linux.tar.gz` — extract and run the binary |
          files: |
            goatly-windows/goatly-windows.zip
            goatly-macos/goatly-macos.zip
            goatly-linux/goatly-linux.tar.gz
